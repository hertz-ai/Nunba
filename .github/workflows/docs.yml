name: Deploy Docs & Test Reports

on:
  push:
    branches: [main]
  # Allow manual trigger (useful for regenerating reports)
  workflow_dispatch:

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ── Build MkDocs documentation ──
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material pymdown-extensions

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/

  # ── Run Cypress E2E tests with coverage ──
  test-reports:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing-page
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Start React dev server with coverage instrumentation
      - name: Start dev server (with coverage)
        run: |
          CYPRESS_COVERAGE=true npx react-app-rewired start &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          BROWSER: none
          CYPRESS_COVERAGE: 'true'

      # Run Cypress with Mochawesome reporter
      - name: Run Cypress E2E tests
        run: npx cypress run --browser chrome
        continue-on-error: true  # Don't fail the workflow if tests fail (still deploy report)
        env:
          CYPRESS_COVERAGE: 'true'

      # Generate NYC coverage report
      - name: Generate coverage report
        run: |
          npx nyc report --reporter=html --report-dir=coverage
        continue-on-error: true

      # Upload test report
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            landing-page/cypress/reports/
            landing-page/cypress/screenshots/
        if: always()

      # Upload coverage report
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: landing-page/coverage/
        if: always()

  # ── Combine and deploy to GitHub Pages ──
  deploy:
    needs: [build-docs, test-reports]
    if: always() && needs.build-docs.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download docs
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site/

      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: site/test-reports/
        continue-on-error: true  # Deploy docs even if tests weren't run

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: site/coverage/
        continue-on-error: true

      # Create an index page linking docs, reports, and coverage
      - name: Create reports index
        run: |
          cat > site/reports.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Nunba - Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #0F0E17; color: #e0e0e0; }
              h1 { color: #6C63FF; }
              a { color: #6C63FF; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .card { background: #1A1A2E; border-radius: 12px; padding: 24px; margin: 16px 0; }
              .card h2 { margin-top: 0; color: #fff; }
              .card p { color: #999; }
            </style>
          </head>
          <body>
            <h1>Nunba Reports</h1>
            <div class="card">
              <h2><a href="./">Documentation</a></h2>
              <p>Setup guides, architecture, API reference</p>
            </div>
            <div class="card">
              <h2><a href="./test-reports/">E2E Test Report</a></h2>
              <p>Cypress Mochawesome HTML report with pass/fail details and screenshots</p>
            </div>
            <div class="card">
              <h2><a href="./coverage/">Code Coverage</a></h2>
              <p>Istanbul/NYC coverage report showing tested lines, branches, and functions</p>
            </div>
          </body>
          </html>
          INDEXEOF

      - name: Upload combined site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
