<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    overflow: hidden;
    width: 180px;
    height: 240px;
    user-select: none;
    -webkit-user-select: none;
    -webkit-app-region: drag;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .companion { width: 180px; height: 240px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; }

  /* ── Curious Character SVG ────────────────────── */
  .character {
    width: 100px; height: 120px;
    position: relative;
    cursor: pointer;
    -webkit-app-region: no-drag;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 6px 16px rgba(108, 99, 255, 0.35));
    transition: transform 0.2s;
  }
  .character:hover { transform: scale(1.08); }

  /* SVG character: curious blob with big eyes, antenna, and smile */
  .char-body { fill: url(#bodyGrad); }
  .char-eye { fill: #fff; }
  .char-pupil { fill: #1a1a2e; }
  .char-highlight { fill: rgba(255,255,255,0.35); }
  .char-mouth { fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; }
  .char-antenna { stroke: #9B94FF; stroke-width: 2.5; fill: none; stroke-linecap: round; }
  .char-antenna-tip { fill: #FF6B6B; }
  .char-cheek { fill: rgba(255, 107, 107, 0.25); }

  /* Eye tracking — pupils shift based on cursor */
  .char-pupil { transition: transform 0.15s ease-out; }

  /* Blink */
  .char-eyelid { fill: url(#bodyGrad); opacity: 0; }
  .blink .char-eyelid { animation: blink-anim 0.15s ease-in-out; }

  /* Speaking: mouth opens wider */
  .speaking .char-mouth { animation: speak-anim 0.25s ease-in-out infinite alternate; }

  /* Listening: antenna pulses */
  .listening .char-antenna-tip { animation: listen-pulse 0.6s ease-in-out infinite alternate; }

  /* ── Speech bubble ───────────────────────────── */
  .bubble {
    background: rgba(15, 14, 23, 0.92);
    border: 1px solid rgba(108, 99, 255, 0.5);
    border-radius: 14px;
    padding: 10px 14px;
    margin-bottom: 8px;
    max-width: 170px;
    font-size: 12px;
    color: #e8e8e8;
    line-height: 1.4;
    text-align: center;
    opacity: 0;
    transform: translateY(6px) scale(0.9);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    -webkit-app-region: no-drag;
    cursor: default;
  }
  .bubble.visible { opacity: 1; transform: translateY(0) scale(1); }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 7px solid rgba(15, 14, 23, 0.92);
  }

  /* ── Name + mode ─────────────────────────────── */
  .status-bar {
    display: flex; align-items: center; gap: 6px;
    margin-top: 4px;
  }
  .name-label {
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(155, 148, 255, 0.6);
  }
  .mode-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .mode-dot.idle { background: #4CAF50; }
  .mode-dot.active { background: #FF9800; }
  .mode-dot.sleep { background: #555; }

  /* ── Animations ──────────────────────────────── */
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes blink-anim {
    0%, 100% { opacity: 0; }
    40%, 60% { opacity: 1; }
  }
  @keyframes speak-anim {
    0% { d: path('M 32 72 Q 42 76 52 72'); }
    100% { d: path('M 32 72 Q 42 82 52 72'); }
  }
  @keyframes listen-pulse {
    0% { r: 5; fill: #FF6B6B; }
    100% { r: 7; fill: #6C63FF; }
  }
  @keyframes antenna-curious {
    0%, 100% { d: path('M 42 10 Q 50 -5 58 8'); }
    50% { d: path('M 42 10 Q 55 -8 60 5'); }
  }

  /* Mode overrides */
  .companion.sleep .character { animation-duration: 6s; opacity: 0.7; }
  .companion.active .character { animation: none; }
</style>
</head>
<body>
<div class="companion" id="companion">
  <div class="bubble" id="bubble"></div>

  <div class="character" id="character">
    <svg viewBox="0 0 84 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6C63FF"/>
          <stop offset="100%" stop-color="#9B94FF"/>
        </linearGradient>
      </defs>

      <!-- Antenna -->
      <path class="char-antenna" d="M 42 22 Q 42 5 54 2"/>
      <circle class="char-antenna-tip" cx="54" cy="2" r="5"/>

      <!-- Body (rounded blob) -->
      <ellipse class="char-body" cx="42" cy="58" rx="36" ry="38"/>

      <!-- Cheeks -->
      <ellipse class="char-cheek" cx="18" cy="62" rx="8" ry="5"/>
      <ellipse class="char-cheek" cx="66" cy="62" rx="8" ry="5"/>

      <!-- Left eye -->
      <ellipse class="char-eye" cx="30" cy="50" rx="9" ry="11"/>
      <circle class="char-pupil" id="pupilL" cx="30" cy="50" r="4.5"/>
      <circle class="char-highlight" cx="33" cy="46" r="2"/>
      <ellipse class="char-eyelid" cx="30" cy="50" rx="9" ry="11"/>

      <!-- Right eye -->
      <ellipse class="char-eye" cx="54" cy="50" rx="9" ry="11"/>
      <circle class="char-pupil" id="pupilR" cx="54" cy="50" r="4.5"/>
      <circle class="char-highlight" cx="57" cy="46" r="2"/>
      <ellipse class="char-eyelid" cx="54" cy="50" rx="9" ry="11"/>

      <!-- Mouth (smile) -->
      <path class="char-mouth" id="mouth" d="M 32 72 Q 42 78 52 72"/>
    </svg>
  </div>

  <div class="status-bar">
    <div class="mode-dot idle" id="modeDot"></div>
    <div class="name-label" id="nameLabel">Your Pal</div>
  </div>

  <!-- Hidden audio element for TTS playback -->
  <audio id="ttsAudio" preload="none"></audio>
</div>

<script>
var bubble = document.getElementById('bubble');
var nameLabel = document.getElementById('nameLabel');
var companion = document.getElementById('companion');
var character = document.getElementById('character');
var modeDot = document.getElementById('modeDot');
var ttsAudio = document.getElementById('ttsAudio');
var pupilL = document.getElementById('pupilL');
var pupilR = document.getElementById('pupilR');
var _blinkTimer = null;
var _speaking = false;
var _listening = false;

// ── Localized names ──
var NAMES = {
  en:'Your Pal', ta:'Nanba', hi:'Dost', bn:'Bondhu', te:'Sneham',
  mr:'Mitra', gu:'Mitra', kn:'Gelaya', ml:'Koottu', pa:'Yaar',
  ur:'Dost', ne:'Sathi', ja:'Tomodachi', ko:'Chingu', zh:'Pengyou',
  th:'Pheuan', es:'Tu Amigo', fr:'Ton Ami', de:'Dein Kumpel',
  pt:'Seu Amigo', ru:'Drug', ar:'Sadiq', sw:'Rafiki',
  it:'Amico', tr:'Arkadas'
};

function setLanguage(lang) { nameLabel.textContent = NAMES[lang] || NAMES.en; }

// ── Speech bubble ──
function showBubble(text, duration) {
  bubble.textContent = text;
  bubble.classList.add('visible');
  if (duration > 0) setTimeout(function(){ bubble.classList.remove('visible'); }, duration);
}
function hideBubble() { bubble.classList.remove('visible'); }

// ── Mode (idle/active/sleep) ──
function setMode(mode) {
  companion.className = 'companion ' + mode;
  modeDot.className = 'mode-dot ' + mode;
}

// ── Speaking animation ──
function setSpeaking(v) {
  _speaking = v;
  if (v) character.classList.add('speaking');
  else character.classList.remove('speaking');
}

// ── Listening animation ──
function setListening(v) {
  _listening = v;
  if (v) character.classList.add('listening');
  else character.classList.remove('listening');
}

// ── TTS Playback (receives audio URL from main app) ──
function playTTS(url) {
  setSpeaking(true);
  ttsAudio.src = url;
  ttsAudio.play().catch(function(){});
}
ttsAudio.addEventListener('ended', function() { setSpeaking(false); });
ttsAudio.addEventListener('error', function() { setSpeaking(false); });

// ── Eye tracking (follow cursor within the small window) ──
document.addEventListener('mousemove', function(e) {
  var cx = 90, cy = 80; // Center of character in page coords
  var dx = (e.clientX - cx) / 90;
  var dy = (e.clientY - cy) / 120;
  dx = Math.max(-1, Math.min(1, dx)) * 3;
  dy = Math.max(-1, Math.min(1, dy)) * 2;
  pupilL.setAttribute('cx', 30 + dx);
  pupilL.setAttribute('cy', 50 + dy);
  pupilR.setAttribute('cx', 54 + dx);
  pupilR.setAttribute('cy', 50 + dy);
});

// ── Blink periodically ──
function doBlink() {
  character.classList.add('blink');
  setTimeout(function(){ character.classList.remove('blink'); }, 200);
  _blinkTimer = setTimeout(doBlink, 3000 + Math.random() * 4000);
}
_blinkTimer = setTimeout(doBlink, 2000);

// ── Click: send voice input or open chat ──
character.addEventListener('click', function(e) {
  e.stopPropagation();
  if (window.pywebview && window.pywebview.api) {
    window.pywebview.api.on_companion_click();
  }
});

// ── Double click: open main window ──
character.addEventListener('dblclick', function(e) {
  e.stopPropagation();
  if (window.pywebview && window.pywebview.api) {
    window.pywebview.api.on_companion_dblclick();
  }
});

// ── Greeting ──
setTimeout(function() { showBubble('Hey! Click me to talk.', 4000); }, 1500);

// ── Idle thoughts ──
function idleThought() {
  if (_speaking || _listening) return setTimeout(idleThought, 60000);
  var thoughts = [
    'Need any help?', 'I can hear you...', 'Try asking me anything!',
    'Want to create something?', 'I can make videos, images, music...',
    'Click me to chat!', 'Double-click to open Nunba',
  ];
  showBubble(thoughts[Math.floor(Math.random() * thoughts.length)], 5000);
  setTimeout(idleThought, (300 + Math.random() * 600) * 1000);
}
setTimeout(idleThought, 120000);

// ── API for pywebview ──
window.companionAPI = {
  setLanguage: setLanguage,
  showBubble: showBubble,
  hideBubble: hideBubble,
  setMode: setMode,
  setSpeaking: setSpeaking,
  setListening: setListening,
  playTTS: playTTS,
};
</script>
</body>
</html>
