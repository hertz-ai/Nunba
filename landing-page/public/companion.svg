<svg xmlns="http://www.w3.org/2000/svg" width="420" height="200" viewBox="0 0 420 200">
  <defs>
    <!-- Gradient for button background (green → blue) -->
    <linearGradient id="buttonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FC0F50"/>
      <stop offset="16%"  stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#F000Fb"/>
      <stop offset="60%" stop-color="#0b0FF2"/>
      <stop offset="80%" stop-color="#F205F4"/>
      <stop offset="100%" stop-color="#F2055F"/>

    </linearGradient>
    <!-- Subtle highlight overlay for depth -->
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="30%"  stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.10"/>


      <stop offset="90%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Drop shadow filter for subtle bevel effect -->
   
  </defs>
  
<!-- Button background: rounded rectangle with gradient and shadow -->
  <rect x="0" y="0" width="420" height="200" rx="20" ry="20"
        fill="url(#buttonGradient)" filter="url(#buttonShadow)" />

  <!-- Top-half glossy highlight for a bevel look -->
  <path d="M 0 0 L 420 0 L 420 100 Q 420 100 630 100 L 10 100 Q 0 100 0 100 Z"
        fill="white" opacity="0.1" />

  <!-- Semi-transparent circle behind the logo for contrast -->
  <circle cx="68" cy="100" r="50" fill="white" opacity="0.2" />

