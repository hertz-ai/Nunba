<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0A0914"/>
      <stop offset="100%" stop-color="#0F0E1A"/>
    </linearGradient>
    <linearGradient id="festival" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFA000"/>
      <stop offset="25%" stop-color="#E91E63"/>
      <stop offset="50%" stop-color="#9C27B0"/>
      <stop offset="75%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFA000" stop-opacity="0"/>
      <stop offset="25%" stop-color="#FFA000" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#E91E63" stop-opacity="1"/>
      <stop offset="75%" stop-color="#9C27B0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9C27B0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="28%">
      <stop offset="0%" stop-color="#FFA000" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFA000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bm" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFA000" stop-opacity="0.08"/><stop offset="100%" stop-color="#FFA000" stop-opacity="0"/></radialGradient>
    <radialGradient id="bp" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#E91E63" stop-opacity="0.07"/><stop offset="100%" stop-color="#E91E63" stop-opacity="0"/></radialGradient>
    <radialGradient id="bb" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00BCD4" stop-opacity="0.06"/><stop offset="100%" stop-color="#00BCD4" stop-opacity="0"/></radialGradient>
    <radialGradient id="bv" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#9C27B0" stop-opacity="0.07"/><stop offset="100%" stop-color="#9C27B0" stop-opacity="0"/></radialGradient>
  </defs>

  <rect width="960" height="640" fill="url(#bg)"/>

  <!-- Kolam dot grid -->
  <g fill="#1A1730" opacity="0.7">
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.8"/>
    </pattern>
    <rect width="960" height="640" fill="url(#dots)"/>
  </g>

  <!-- Holi bloom glows -->
  <circle cx="120" cy="100" r="90" fill="url(#bm)"/>
  <circle cx="840" cy="540" r="80" fill="url(#bp)"/>
  <circle cx="800" cy="80" r="70" fill="url(#bb)"/>
  <circle cx="160" cy="560" r="75" fill="url(#bv)"/>

  <!-- Kolam loops (festival tinted) -->
  <g transform="translate(100,90)" stroke="#FFA000" fill="none" stroke-width="1.2" opacity="0.2">
    <circle r="24"/><circle r="40"/><circle r="56"/>
  </g>
  <g transform="translate(860,550)" stroke="#E91E63" fill="none" stroke-width="1.2" opacity="0.2">
    <circle r="24"/><circle r="40"/><circle r="56"/>
  </g>
  <g transform="translate(800,80)" stroke="#00BCD4" fill="none" stroke-width="1" opacity="0.2">
    <path d="M-30,0 Q0,-30 30,0 Q0,30 -30,0"/><path d="M0,-30 Q30,0 0,30 Q-30,0 0,-30"/>
  </g>
  <g transform="translate(160,560)" stroke="#9C27B0" fill="none" stroke-width="1" opacity="0.2">
    <path d="M-30,0 Q0,-30 30,0 Q0,30 -30,0"/><path d="M0,-30 Q30,0 0,30 Q-30,0 0,-30"/>
  </g>

  <!-- Festival bars -->
  <rect width="960" height="5" fill="url(#festival)"/>
  <rect y="635" width="960" height="5" fill="url(#festival)"/>

  <!-- Temple pillars -->
  <g stroke="#1A1730" stroke-width="1" opacity="0.25">
    <line x1="40" y1="30" x2="40" y2="610"/><line x1="44" y1="30" x2="44" y2="610"/>
    <line x1="916" y1="30" x2="916" y2="610"/><line x1="920" y1="30" x2="920" y2="610"/>
  </g>

  <!-- Rangoli particles -->
  <g opacity="0.5">
    <circle cx="55" cy="200" r="3" fill="#E91E63"/><circle cx="900" cy="180" r="2.5" fill="#00BCD4"/>
    <circle cx="75" cy="400" r="2" fill="#9C27B0"/><circle cx="880" cy="420" r="3" fill="#FFA000"/>
    <circle cx="920" cy="260" r="2" fill="#E91E63"/><circle cx="35" cy="480" r="2.5" fill="#00BFA5"/>
    <circle cx="890" cy="90" r="2" fill="#FFA000"/><circle cx="60" cy="150" r="1.8" fill="#00BCD4"/>
    <circle cx="50" cy="550" r="2.5" fill="#E91E63"/><circle cx="910" cy="500" r="2" fill="#9C27B0"/>
  </g>

  <!-- Warm glow -->
  <ellipse cx="480" cy="220" rx="260" ry="160" fill="url(#glow)"/>

  <!-- ═══ நண்பா ═══ -->
  <text x="480" y="200" text-anchor="middle" fill="#D4A843"
        font-family="Nirmala UI, Tamil Sangam MN, sans-serif" font-size="72"
        letter-spacing="6">&#2984;&#2979;&#3021;&#2986;&#3006;</text>

  <rect x="320" y="215" width="320" height="2" fill="url(#divider)"/>

  <text x="480" y="260" text-anchor="middle" fill="#FFFFFE"
        font-family="Bahnschrift, DIN Alternate, Futura, sans-serif" font-size="36"
        font-weight="300" letter-spacing="16" opacity="0.9">N U N B A</text>

  <text x="480" y="295" text-anchor="middle" fill="#D4A843"
        font-family="Bahnschrift, DIN Alternate, Futura, sans-serif" font-size="13"
        font-weight="300" letter-spacing="6" opacity="0.55">F R I E N D</text>

  <!-- One clean line of Indian languages (native scripts) -->
  <text x="480" y="340" text-anchor="middle" fill="#94A1B2"
        font-family="Nirmala UI, Segoe UI, sans-serif" font-size="11.5" letter-spacing="1" opacity="0.5">&#2342;&#2379;&#2360;&#2381;&#2340; &#183; &#2476;&#2472;&#2509;&#2471;&#2497; &#183; &#3118;&#3135;&#3108;&#3149;&#3120;&#3137;&#3105;&#3137; &#183; &#3223;&#3270;&#3243;&#3270;&#3247; &#183; &#3384;&#3393;&#3385;&#3395;&#3364;&#3405;&#3364;&#3405; &#183; &#2734;&#2751;&#2724;&#2765;&#2736; &#183; &#2606;&#2623;&#2673;&#2596;&#2608; &#183; &#2860;&#2856;&#2893;&#2855;&#2881;</text>

  <!-- Hive hexagons -->
  <g transform="translate(480,410)" stroke="#6C63FF" fill="none" stroke-width="1.2">
    <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="#221E40" stroke="#6C63FF"/>
    <polygon points="0,-44 14,-36 14,-20 0,-12 -14,-20 -14,-36" fill="#1A1535"/>
    <polygon points="28,-22 42,-14 42,2 28,10 14,2 14,-14" fill="#1A1535"/>
    <polygon points="28,6 42,14 42,30 28,38 14,30 14,14" fill="#1A1535"/>
    <polygon points="0,12 14,20 14,36 0,44 -14,36 -14,20" fill="#1A1535"/>
    <polygon points="-28,6 -14,14 -14,30 -28,38 -42,30 -42,14" fill="#1A1535"/>
    <polygon points="-28,-22 -14,-14 -14,2 -28,10 -42,2 -42,-14" fill="#1A1535"/>
  </g>
  <circle cx="480" cy="410" r="4" fill="#FFA000"/>
  <g stroke="#6C63FF" stroke-width="0.6" opacity="0.3">
    <line x1="480" y1="410" x2="480" y2="366"/><line x1="480" y1="410" x2="508" y2="388"/>
    <line x1="480" y1="410" x2="508" y2="416"/><line x1="480" y1="410" x2="480" y2="454"/>
    <line x1="480" y1="410" x2="452" y2="416"/><line x1="480" y1="410" x2="452" y2="388"/>
  </g>

  <text x="480" y="500" text-anchor="middle" fill="#94A1B2"
        font-family="Bahnschrift, DIN Alternate, Futura, sans-serif" font-size="16"
        font-weight="300" letter-spacing="5">DEMOCRATIC  HIVE  INTELLIGENCE</text>

  <text x="480" y="530" text-anchor="middle" fill="#72757E"
        font-family="Segoe UI, sans-serif" font-size="11" letter-spacing="0.5">Taking Human Evolution To Next Step With Hive Artificial Intelligence</text>

  <rect x="398" y="548" width="164" height="24" rx="4" fill="#121020" stroke="#6C63FF" stroke-width="0.8"/>
  <text x="480" y="564" text-anchor="middle" fill="#6C63FF"
        font-family="Bahnschrift, Consolas, monospace" font-size="11">CONNECTING TO YOUR HART</text>

  <!-- Made with love -->
  <text x="480" y="596" text-anchor="middle" fill="#72757E"
        font-family="Segoe UI, sans-serif" font-size="10" letter-spacing="1.5" opacity="0.45">Made With <tspan fill="#E91E63" opacity="1">&#9829;</tspan> From India</text>
  <text x="480" y="614" text-anchor="middle" fill="#6C63FF"
        font-family="Bahnschrift, DIN Alternate, Futura, sans-serif" font-size="9.5" letter-spacing="2" opacity="0.4">By Hevolve.ai</text>
</svg>
