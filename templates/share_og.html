<!DOCTYPE html>
<html prefix="og: https://ogp.me/ns#">
<head>
  <meta charset="UTF-8" />
  <meta property="og:title" content="{{ og_title }}" />
  <meta property="og:description" content="{{ og_description }}" />
  <meta property="og:image" content="{{ og_image }}" />
  <meta property="og:type" content="{{ og_type }}" />
  <meta property="og:url" content="{{ og_url }}" />
  <meta property="og:site_name" content="Nunba" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ og_title }}" />
  <meta name="twitter:description" content="{{ og_description }}" />
  <meta name="twitter:image" content="{{ og_image }}" />
  <meta http-equiv="refresh" content="0; url={{ redirect_url }}" />
  <title>{{ og_title }} — Nunba</title>
  <style>
    body {
      margin: 0; padding: 0;
      background: #0F0E17; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh;
    }
    .loading {
      text-align: center; opacity: 0.7;
    }
    .loading p { font-size: 14px; color: #aaa; }
    .spinner {
      width: 32px; height: 32px; margin: 16px auto;
      border: 3px solid #333; border-top-color: #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Redirecting to Nunba...</p>
  </div>
</body>
</html>
